<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova tarefa</title>
    <link rel="stylesheet" href="../styles/task-form.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="card__header">
          <h1>Nova tarefa</h1>
          <p>Registre tempo manualmente ou via timer.</p>
        </header>

        <form class="task-form" id="taskForm" novalidate>
          <div class="field">
            <label for="taskName">Nome da tarefa</label>
            <input
              id="taskName"
              name="taskName"
              type="text"
              placeholder="Ex.: Reunião com cliente"
              required
            />
            <span class="field__message" id="taskNameError">Informe um nome.</span>
          </div>

          <div class="field">
            <label for="projectSelect">Projeto (opcional)</label>
            <select id="projectSelect" name="projectId">
              <option value="">Sem projeto</option>
            </select>
          </div>

          <div class="field">
            <span class="label">Modo de registro</span>
            <div class="toggle">
              <label class="toggle__option">
                <input type="radio" name="mode" value="manual" checked />
                Manual
              </label>
              <label class="toggle__option">
                <input type="radio" name="mode" value="timer" />
                Timer
              </label>
            </div>
          </div>

          <div class="mode mode--manual" id="manualMode">
            <div class="field">
              <label for="hours">Horas</label>
              <input id="hours" name="hours" type="number" min="0" max="999" placeholder="0" />
            </div>
            <div class="field">
              <label for="minutes">Minutos</label>
              <input id="minutes" name="minutes" type="number" min="0" max="59" placeholder="0" />
              <span class="field__message" id="manualError">
                Informe um tempo maior que zero.
              </span>
            </div>
          </div>

          <div class="mode mode--timer is-hidden" id="timerMode">
            <div class="timer-status" id="timerStatus" role="status" aria-live="polite">
              <span class="timer-status__label">Status:</span>
              <span class="timer-status__value" data-status="stopped">Parado</span>
              <span class="timer-status__time" id="timerDisplay">00:00:00</span>
            </div>
            <div class="timer-controls">
              <button type="button" class="button" id="startTimer">Iniciar</button>
              <button type="button" class="button" id="pauseTimer" disabled>Pausar</button>
              <button type="button" class="button button--ghost" id="stopTimer" disabled>
                Finalizar
              </button>
            </div>
          </div>

          <footer class="form-footer">
            <button class="button button--primary" type="submit">Salvar tarefa</button>
          </footer>
        </form>

        <section class="project-manager" aria-labelledby="projectManagerTitle">
          <header class="section-header">
            <h2 id="projectManagerTitle">Projetos</h2>
            <p>Crie, renomeie ou remova projetos para organizar suas tarefas.</p>
          </header>

          <form class="project-form" id="projectForm" novalidate>
            <div class="field">
              <label for="projectInput">Novo projeto</label>
              <input
                id="projectInput"
                name="projectInput"
                type="text"
                placeholder="Ex.: Cliente Alfa"
                required
              />
              <span class="field__message" id="projectError">
                Informe um nome único para o projeto.
              </span>
            </div>
            <button class="button button--primary" type="submit">Adicionar projeto</button>
          </form>

          <ul class="project-list" id="projectList" aria-live="polite"></ul>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById('taskForm');
      const taskName = document.getElementById('taskName');
      const taskNameError = document.getElementById('taskNameError');
      const projectSelect = document.getElementById('projectSelect');
      const manualMode = document.getElementById('manualMode');
      const timerMode = document.getElementById('timerMode');
      const hours = document.getElementById('hours');
      const minutes = document.getElementById('minutes');
      const manualError = document.getElementById('manualError');
      const startTimer = document.getElementById('startTimer');
      const pauseTimer = document.getElementById('pauseTimer');
      const stopTimer = document.getElementById('stopTimer');
      const timerStatus = document.querySelector('.timer-status__value');
      const timerDisplay = document.getElementById('timerDisplay');
      const projectForm = document.getElementById('projectForm');
      const projectInput = document.getElementById('projectInput');
      const projectError = document.getElementById('projectError');
      const projectList = document.getElementById('projectList');

      let timerState = 'stopped';
      let elapsedSeconds = 0;
      let timerInterval = null;

      const PROJECTS_KEY = 'time-tracker-projects';

      function loadProjects() {
        const stored = localStorage.getItem(PROJECTS_KEY);
        if (!stored) {
          return [];
        }
        try {
          const parsed = JSON.parse(stored);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function saveProjects(projects) {
        localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
      }

      function normalizeName(name) {
        return name.trim().toLocaleLowerCase('pt-BR');
      }

      function setProjectError(message) {
        if (message) {
          projectInput.classList.add('is-invalid');
          projectError.textContent = message;
          projectError.classList.add('is-visible');
        } else {
          projectInput.classList.remove('is-invalid');
          projectError.classList.remove('is-visible');
        }
      }

      function hasDuplicateName(name, excludeId = null) {
        const normalized = normalizeName(name);
        return loadProjects().some(
          (project) => normalizeName(project.name) === normalized && project.id !== excludeId,
        );
      }

      function renderProjectSelect(projects) {
        const selectedValue = projectSelect.value;
        projectSelect.innerHTML = '';

        const emptyOption = document.createElement('option');
        emptyOption.value = '';
        emptyOption.textContent = 'Sem projeto';
        projectSelect.appendChild(emptyOption);

        const activeProjects = projects.filter((project) => project.status === 'active');
        if (activeProjects.length === 0) {
          const emptyState = document.createElement('option');
          emptyState.value = '';
          emptyState.textContent = 'Nenhum projeto ativo';
          emptyState.disabled = true;
          projectSelect.appendChild(emptyState);
        } else {
          activeProjects.forEach((project) => {
            const option = document.createElement('option');
            option.value = project.id;
            option.textContent = project.name;
            projectSelect.appendChild(option);
          });
        }

        const stillAvailable = activeProjects.some((project) => project.id === selectedValue);
        projectSelect.value = stillAvailable ? selectedValue : '';
      }

      function renderProjectList(projects) {
        projectList.innerHTML = '';

        if (projects.length === 0) {
          const emptyItem = document.createElement('li');
          emptyItem.className = 'project-list__empty';
          emptyItem.textContent = 'Nenhum projeto cadastrado ainda.';
          projectList.appendChild(emptyItem);
          return;
        }

        projects.forEach((project) => {
          const item = document.createElement('li');
          item.className = 'project-list__item';

          const nameWrapper = document.createElement('div');
          nameWrapper.className = 'project-list__name';
          nameWrapper.textContent = project.name;
          item.appendChild(nameWrapper);

          if (project.status === 'deleted') {
            const status = document.createElement('span');
            status.className = 'project-status project-status--deleted';
            status.textContent = 'Removido';
            item.appendChild(status);
          }

          const actions = document.createElement('div');
          actions.className = 'project-actions';

          const renameButton = document.createElement('button');
          renameButton.type = 'button';
          renameButton.className = 'button';
          renameButton.textContent = 'Renomear';
          renameButton.disabled = project.status === 'deleted';
          renameButton.addEventListener('click', () => handleRename(project));

          const deleteButton = document.createElement('button');
          deleteButton.type = 'button';
          deleteButton.className = 'button button--ghost';
          deleteButton.textContent = 'Remover';
          deleteButton.disabled = project.status === 'deleted';
          deleteButton.addEventListener('click', () => handleDelete(project));

          actions.appendChild(renameButton);
          actions.appendChild(deleteButton);
          item.appendChild(actions);
          projectList.appendChild(item);
        });
      }

      function renderProjects() {
        const projects = loadProjects();
        renderProjectSelect(projects);
        renderProjectList(projects);
      }

      function createProject(name) {
        const trimmed = name.trim();
        if (!trimmed) {
          setProjectError('Informe um nome para o projeto.');
          return;
        }

        if (hasDuplicateName(trimmed)) {
          setProjectError('Já existe um projeto com esse nome.');
          return;
        }

        const now = new Date().toISOString();
        const project = {
          id: crypto.randomUUID ? crypto.randomUUID() : `project-${Date.now()}`,
          name: trimmed,
          status: 'active',
          createdAt: now,
          updatedAt: now,
        };

        const projects = loadProjects();
        projects.push(project);
        saveProjects(projects);
        projectInput.value = '';
        setProjectError('');
        renderProjects();
      }

      function handleRename(project) {
        const newName = window.prompt('Novo nome do projeto:', project.name);
        if (newName === null) {
          return;
        }

        const trimmed = newName.trim();
        if (!trimmed) {
          setProjectError('Informe um nome para renomear.');
          return;
        }

        if (hasDuplicateName(trimmed, project.id)) {
          setProjectError('Já existe um projeto com esse nome.');
          return;
        }

        const projects = loadProjects();
        const updatedProjects = projects.map((stored) => {
          if (stored.id !== project.id) {
            return stored;
          }
          return {
            ...stored,
            name: trimmed,
            updatedAt: new Date().toISOString(),
          };
        });
        saveProjects(updatedProjects);
        setProjectError('');
        renderProjects();
      }

      function handleDelete(project) {
        if (
          !window.confirm(
            `Deseja remover o projeto "${project.name}"? Ele não aparecerá em novas tarefas.`,
          )
        ) {
          return;
        }

        const projects = loadProjects();
        const updatedProjects = projects.map((stored) => {
          if (stored.id !== project.id) {
            return stored;
          }
          return {
            ...stored,
            status: 'deleted',
            updatedAt: new Date().toISOString(),
          };
        });

        saveProjects(updatedProjects);
        renderProjects();
      }

      function setMode(mode) {
        const isManual = mode === 'manual';
        manualMode.classList.toggle('is-hidden', !isManual);
        timerMode.classList.toggle('is-hidden', isManual);
      }

      function updateTimerDisplay() {
        const hoursValue = String(Math.floor(elapsedSeconds / 3600)).padStart(2, '0');
        const minutesValue = String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2, '0');
        const secondsValue = String(elapsedSeconds % 60).padStart(2, '0');
        timerDisplay.textContent = `${hoursValue}:${minutesValue}:${secondsValue}`;
      }

      function setTimerState(state) {
        timerState = state;
        timerStatus.dataset.status = state;
        timerStatus.textContent =
          state === 'running' ? 'Em andamento' : state === 'paused' ? 'Pausado' : 'Parado';

        startTimer.disabled = state === 'running';
        pauseTimer.disabled = state !== 'running';
        stopTimer.disabled = state === 'stopped';
      }

      function startInterval() {
        if (timerInterval) {
          clearInterval(timerInterval);
        }
        timerInterval = setInterval(() => {
          elapsedSeconds += 1;
          updateTimerDisplay();
        }, 1000);
      }

      document.querySelectorAll('input[name="mode"]').forEach((input) => {
        input.addEventListener('change', (event) => {
          setMode(event.target.value);
        });
      });

      startTimer.addEventListener('click', () => {
        setTimerState('running');
        startInterval();
      });

      pauseTimer.addEventListener('click', () => {
        if (timerInterval) {
          clearInterval(timerInterval);
        }
        setTimerState('paused');
      });

      stopTimer.addEventListener('click', () => {
        if (timerInterval) {
          clearInterval(timerInterval);
        }
        setTimerState('stopped');
      });

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        let isValid = true;

        if (!taskName.value.trim()) {
          taskName.classList.add('is-invalid');
          taskNameError.classList.add('is-visible');
          isValid = false;
        } else {
          taskName.classList.remove('is-invalid');
          taskNameError.classList.remove('is-visible');
        }

        const activeMode = document.querySelector('input[name="mode"]:checked').value;
        if (activeMode === 'manual') {
          const totalMinutes = Number(hours.value || 0) * 60 + Number(minutes.value || 0);
          if (totalMinutes <= 0) {
            hours.classList.add('is-invalid');
            minutes.classList.add('is-invalid');
            manualError.classList.add('is-visible');
            isValid = false;
          } else {
            hours.classList.remove('is-invalid');
            minutes.classList.remove('is-invalid');
            manualError.classList.remove('is-visible');
          }
        }

        if (isValid) {
          alert('Tarefa pronta para ser salva.');
        }
      });

      projectForm.addEventListener('submit', (event) => {
        event.preventDefault();
        createProject(projectInput.value);
      });

      setTimerState('stopped');
      updateTimerDisplay();
      renderProjects();
    </script>
  </body>
</html>
