version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - Zustand
  - localStorage
routes:
  - path: /
    file: src/app/App.tsx
    auth_required: false
    description: Single-page shell with sidebar navigation between Tarefas and Projetos views
features:
  - name: Task list and filters
    description: View tasks with date range and project filters, clear filters, delete tasks
    files:
      - src/features/task-form/pages/TaskFormPage.tsx
      - src/features/task-form/store/task-form-store.ts
    entry_route: /
    user_interactions:
      - Select start and end dates in filter fields
      - Select project filter (Todos, Sem projeto, or active project)
      - Click Limpar filtros to reset filters
      - Click Excluir on a task and confirm deletion
    api_calls: []
    auth_required: false
  - name: Create manual task
    description: Register a finished task with name, optional project, and manual hours/minutes
    files:
      - src/features/task-form/pages/TaskFormPage.tsx
      - src/features/task-form/store/task-form-store.ts
      - src/application/task/task-use-cases.ts
    entry_route: /
    user_interactions:
      - Click + to open Nova tarefa modal
      - Fill Nome da tarefa
      - Optionally select Projeto
      - Choose Tempo manual mode
      - Enter hours and minutes
      - Submit form to save task
    api_calls: []
    auth_required: false
  - name: Timer task
    description: Start, pause, resume, and stop a single active timer per session
    files:
      - src/features/task-form/pages/TaskFormPage.tsx
      - src/domain/services/timer-service.ts
      - src/features/task-form/store/task-form-store.ts
    entry_route: /
    user_interactions:
      - Open Nova tarefa modal
      - Choose Timer mode
      - Start timer after entering task name
      - Pause and resume timer
      - Stop timer to finalize task
    api_calls: []
    auth_required: false
  - name: Reports summary
    description: Display total hours and task count for the filtered period on the Tarefas page
    files:
      - src/features/task-form/pages/TaskFormPage.tsx
      - src/domain/services/report-service.ts
    entry_route: /
    user_interactions:
      - Apply date/project filters and view Horas totais and Tarefas no periodo cards
    api_calls: []
    auth_required: false
  - name: Project management
    description: Create, rename, and soft-delete projects on the Projetos page
    files:
      - src/features/projects/pages/ProjectsPage.tsx
      - src/application/project/project-use-cases.ts
    entry_route: /
    user_interactions:
      - Click Projetos in sidebar
      - Enter new project name and click Adicionar projeto
      - Click Renomear and save new name
      - Click Remover and confirm deletion
    api_calls: []
    auth_required: false
known_limitations:
  - issue: No dedicated reports page; per-project report breakdown from project.md is not implemented in UI
    location: src/features/task-form/pages/TaskFormPage.tsx
    impact: Only general summary cards are shown, not per-project report table
  - issue: No client-side router; navigation is in-app state only
    location: src/app/App.tsx
    impact: Deep links to /projects are not available
